; This is an .INI file, used as a simple way to tune a game without recompiling/hardcoding it.
; A great place for gameplay variables and more. Another example of data-driven programming. 
[Level1]
levelFile=../Levels/GameLevel.json
modelPath=../Models
enemyCount=1
[Player]
model=Hazmat_Character
hitpoints=3        ; health per life
lives=3            ; number of lives
speed=10.0
firerate=0.25
invulnPeriod=3
; how far the player can move beyond the enemy swarm (left/right)
xBoundaryMargin=2.0 
[Shaders]
pixel=../Shaders/LevelPixel.hlsl
vertex=../Shaders/LevelVertex.hlsl
[Window]
height=768
width=1024
xstart=100
ystart=100
[Enemy1]
model=Spider
initialShatterCount=2
hitpoints=1
speed=5.0
; horizontal movement boundary (half-width from center)
xBoundary=40.0
; ramping speed settings
speedStep=0.25
maxSpeed=25.0
; grid spawning settings
rows=5
cols=11
spacingX=3.0
spacingZ=3.0
spacingX=4.0
spacingZ=4.0
startX=-10.0
startZ=18.0
scale=0.35
startZ=25.0
scale=0.5
; wave settings
waveDropPerWave=1.0
waveResetWave=9

[EggSac]
model=Eggsac
hitpoints=1
speed=7
spawnInterval=12.0
laneZ=25.0
startX=-24
scale=1.0
laneZ=28.0
startX=-50
scale=2.0
oneAtATime=1
spawnIntervalMin=8.0
spawnIntervalMax=18.0
randomSide=1
despawnLimit = 55.0f  ; to be more specific, we want this to be past the edge of our playable screen. its able to be tuned whenever
points=100

[Bullet]
model=Fireball
speed=30.0

[EnemyBullet]
model=Web_Bullet
speed=18.0
fireInterval=2.0
randomFireChance=0.25

[Bunker]
model=Cube
scalex=4.0
scalez=3.0
hitpoints=1

;--------- sound section ---------
[Audio]
enabled=1
master=1.0

[Music]
path=../Audio/CrimsonCascade.wav
volume=0.2
loop=true
playOnStart=false
globalMusicVolume=1.0

[Music.MainMenu]
path=../Audio/SanguinePulse.wav
volume=0.65
loop=true
playOnStart=false

[Music.GameOver]
enabled=false 

[SFX]
shoot=../Audio/PlayerShoot.wav
shootVol=0.6

enemyDie=../Audio/SpiderDeath.wav
enemyDieVol=0.7

eggSpawn=../Audio/eggspawn.wav
eggSpawnVol=0.7

eggDie=../Audio/EggSacDeath.wav
eggDieVol=0.8

[EnemyColors]
row0=0.85,0.15,0.15
row1=0.15,0.85,0.15
row2=0.15,0.15,0.85
row3=0.85,0.85,0.15
row4=0.85,0.15,0.85


; scoring
[EnemyPoints]
row0=50
row1=40
row2=30
row3=20
row4=10
waveClearBonus=250

[Highscores]
s0=0
s1=0
s2=0
s3=0
s4=0
s5=0
s6=0
s7=0
s8=0
s9=0
s10=0
; If you change this file it will replace the saved.ini version if its newer. 
